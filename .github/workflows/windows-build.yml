name: Build Windows EXE

on:
  release:
    types: [published] # Runs automatically
  workflow_dispatch:   # manual Run

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Download your code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pyinstaller

      - name: Compile Windows App
        run: flet pack main.py --name "Tsuki"

      - name: Upload EXE to your Release page
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} dist/Tsuki.exe